# Pre-commit hooks for ArenaHub.
# Install once with:  uv tool install pre-commit && pre-commit install
# Runs automatically before every commit. Python via ruff+black, JS/TS via
# eslint+prettier (scoped to the frontend workspaces).
minimum_pre_commit_version: "3.5.0"

repos:
  # ---- General hygiene ----
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-json
      - id: check-added-large-files
        args: ["--maxkb=2048"]
      - id: check-merge-conflict
      - id: detect-private-key

  # ---- Python: ruff (lint + import sort) then black (format) ----
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.4
    hooks:
      - id: ruff
        args: ["--fix"]
        files: ^backend/
      - id: ruff-format
        files: ^backend/

  - repo: https://github.com/psf/black
    rev: 24.10.0
    hooks:
      - id: black
        files: ^backend/

  # ---- JS/TS: prettier + eslint, scoped to frontend ----
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        files: ^frontend/
        additional_dependencies:
          - prettier@3.4.2

  - repo: https://github.com/pre-commit/mirrors-eslint
    rev: v9.17.0
    hooks:
      - id: eslint
        files: ^frontend/.*\.(js|jsx|ts|tsx)$
        args: ["--max-warnings=0"]
        additional_dependencies:
          - eslint@9.17.0
